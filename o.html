<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

    <style>
        input{
            border: none;
            border-bottom: 2px dotted;
        }
    </style>
</head>

<body>
    <h1 style="text-align: center;">Sports Physical Form</h1>
    <form method="get" action="actionpage.html">
        <fieldset>
            <legend>Athlete Information</legend>
            
            <ul>
                <li>
                    <label for="Name">Name: </label>
                    <input type="text" id = 'Name' placeholder="Enter your name: " required>
                </li>

                <li>
                    <label for="team">School/Team: </label>
                    <input type="text" id = 'team' placeholder="School/Team name: " required>
                </li>

                <li>
                    <label for="Sport">Sport: </label>
                    <input type="text" id = 'Sport' placeholder="sport name: " required>
                </li>

                <li>
                    <label for="number">Parent/Gurdian Name: </label>
                    <input type="text" id = 'number' placeholder="Gurdian name: " required>
                </li>

                <li>
                    <label for="contact">Contact: </label>
                    <input type="number" id = 'contact' placeholder="contact" required>
                </li>

            </ul>
        </fieldset>

        <br>

        <fieldset>
            <legend>Medical History of an Athlete</legend>
            <ul>
                <li>
                    History of concussions:

                    <label for="yes">Yes</label>
                    <input type="radio" id="yes" value="yes" name="history" required>

                    <label for="No">No</label>
                    <input type="radio" id="No" value="no" name="history" >
                </li>
                <li>
                    <label for="history">Previous surgeries</label>
                    <input type="text" id="history" required>
                </li>

                <li>
                    Any bone Fracture?
                    
                    <input type="radio" id="yes" name="fracture" value="yes" required>
                    <label for="yes">Yes</label>

                    <input type="radio" id="no" name="fracture" value="no">
                    <label for="no">No</label>
                </li>
                
                <li>
                    Asthma or breathing problem: 

                    <input type="radio" name="asthma" id="yes" value="yes" required>
                    <label for="yes">Yes</label>

                    <input type="radio" name="asthma" id="no" value="no">
                    <label for="no">No</label>
                </li>
            </ul>
        </fieldset>

        <br>

        <fieldset>
            <legend>Date/Time</legend>
            <ul>
                <li>
                    <label>DOB</label>
                    <input type="date" name="" id="" />
                 </li>
                 <li>
                    <label> Time</label>
                    <input type="time" name="" id="" />
                 </li>
            </ul>

        </fieldset>
        <fieldset>
            <legend>Texttarea</legend>
            <ul>
                
                <label for="summary">Enter your summary</label>
                <textarea name="" id="summary"></textarea>
                
                 </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>File Input</legend>

            Drop your last Medical Report:
            <input type="file" name="" />
             </fieldset>

        <br>

        <fieldset> 
            <input type="file" id="doc">
            <label for="doc">summary your file</label>
            <legend>File Input</legend>
        </fieldset>
        
        <button type="submit">Submit</button>
        <button type="reset">reset</button>
    </form>
    
</body>
</html>
